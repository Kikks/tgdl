name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, and what went wrong? Include the command you ran.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tgdl version
      description: Output of `tgdl --version` (or how you installed it).
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS & Python version
      placeholder: "macOS 15.5, Python 3.12"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any traceback. Redact your API ID/hash and any session data.
      render: shell
